<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Fiber Routing - Advanced UI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="glass-container">
        <!-- Control Panel -->
        <aside class="control-panel">
            <header class="panel-header">
                <h1>Fiber Route Planner</h1>
                <p>Advanced Topology Engine</p>
            </header>
            
            <div class="panel-section">
                <h3>1. Map Data Setup</h3>
                <p class="instruction">Fetch actual buildings and water bodies from OpenStreetMap to act as obstacles.</p>
                <button id="btn-fetch-obstacles" class="btn primary-btn">
                    <span class="btn-icon">🌍</span> Fetch Obstacles
                </button>
                <div id="obstacle-status" class="status-text">Ready</div>
            </div>

            <div class="panel-section">
                <h3>2. Place Nodes on Map</h3>
                <div class="card-group">
                    <label class="radio-card">
                        <input type="radio" name="nodeType" value="isp" checked>
                        <div class="card-content">
                            <span class="card-title">ISP Main Node</span>
                            <span class="card-desc">The core datacenter</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="nodeType" value="hub">
                        <div class="card-content">
                            <span class="card-title">Splitter Hub</span>
                            <span class="card-desc">Distribution point</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="nodeType" value="client">
                        <div class="card-content">
                            <span class="card-title">Client House</span>
                            <span class="card-desc">End user location</span>
                        </div>
                    </label>
                </div>
                <button id="btn-clear-nodes" class="btn secondary-btn">Clear Nodes</button>
            </div>
            
            <div class="panel-section">
                <h3>3. Routing Algorithm</h3>
                <div class="card-group">
                    <label class="radio-card">
                        <input type="radio" name="algorithm" value="astar" checked>
                        <div class="card-content">
                            <span class="card-title">A* Point-to-Point</span>
                            <span class="card-desc">Direct line between two locations</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="algorithm" value="kruskal">
                        <div class="card-content">
                            <span class="card-title">Kruskal's MST</span>
                            <span class="card-desc">Minimum Spanning Tree (Lowest Cost)</span>
                        </div>
                    </label>
                </div>
                <button id="btn-calculate" class="btn action-btn" disabled>
                    <span class="btn-icon">⚡</span> Calculate Route
                </button>
                <div id="route-status" class="status-text"></div>
            </div>

            <!-- History Section -->
            <div class="panel-section" id="history-section">
                <h3>Saved Connections</h3>
                <div id="history-list" class="history-list">
                    <!-- Loaded dynamically -->
                    <div style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 10px;">Loading history...</div>
                </div>
            </div>
            
            <!-- Dynamic Results Area -->
            <div class="panel-section results-section" id="bom-results" style="display: none;">
                <h3>Route Results</h3>
                <div id="bom-content"></div>
                <button id="btn-export" class="btn secondary-btn" style="margin-top: 1rem;">
                    <span class="btn-icon">💾</span> Export GeoJSON
                </button>
            </div>
        </aside>

        <!-- Map Container -->
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <!-- Application Logic (ES Modules) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
